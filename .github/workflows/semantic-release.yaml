on:
  workflow_call:
    inputs:
      library_name:
        description: 'Library name'
        required: true
        type: string

jobs:
  Publish:
    runs-on: [self-hosted, Linux, X64, fv-ubuntu, default]
    env:
      PACKAGE_NAME: ${{ inputs.library_name }}
    permissions:
      contents: write
    steps:
      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.FV_GH_BOT_APP_ID }}
          private_key: ${{ secrets.FV_GH_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.8.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v4
        with:
          gpg_private_key: ${{ secrets.FV_GH_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.FV_GH_BOT_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Build
        run: pnpm exec nx build ${{ inputs.library_name }} && ./update-package-json.sh ./dist/libs/${{ inputs.library_name }}/package.json

      - name: Release
        run: |
          pnpm exec semantic-release --debug
        env:
          GIT_AUTHOR_NAME: 'FVCodePublisher'
          GIT_AUTHOR_EMAIL: 'codepublish@futureverse.com'
          GIT_COMMITTER_NAME: 'FVCodePublisher'
          GIT_COMMITTER_EMAIL: 'codepublish@futureverse.com'
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_loglevel: 'verbose'
