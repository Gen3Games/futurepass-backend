services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '6379:6379'

  scylla-alternator:
    image: scylladb/scylla:6.1
    container_name: scylla-alternator
    command: >-
      --overprovisioned 1
      --smp 1
      --memory 1G
      --alternator-port 8000
      --alternator-write-isolation=always_use_lwt
    ports:
      - 127.0.0.1:8000:8000
      - 127.0.0.1:9042:9042
    volumes:
      - ./.scylla:/var/lib/scylla

  scylla-bootstrap:
    image: amazon/aws-cli:2.17.27
    depends_on:
      - scylla-alternator
    environment:
      - AWS_ACCESS_KEY_ID=alternator
      - AWS_SECRET_ACCESS_KEY=alternator
      - AWS_REGION=us-west-2
      - DYNAMODB_ENDPOINT=http://scylla-alternator:8000
    volumes:
      - ./bootstrap-alternator.sh:/bootstrap-alternator.sh:ro
    entrypoint: sh
    command: /bootstrap-alternator.sh

